<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bank — Check Balance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="header">
    <h1>Bank — Check Balance</h1>
    <div class="env">
      <label for="baseUrl">API Base URL</label>
      <input id="baseUrl" value="http://localhost:8081" />
      <button id="saveBaseUrl">Save</button>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Enter Details</h2>

      <div class="row">
        <div class="field">
          <label for="accountNum">Account Number <span class="req">*</span></label>
          <input id="accountNum" placeholder="e.g., 1000000001" inputmode="numeric" />
        </div>

        <div class="field">
          <label for="atmPin">ATM PIN <span class="req">*</span></label>
          <input id="atmPin" type="password" placeholder="4 digits" maxlength="6" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="bank">Bank Name <span class="req">*</span></label>
          <input id="bank" placeholder="e.g., Demo Bank" />
        </div>

        <div class="field">
          <label for="type">Account Type (optional)</label>
          <input id="type" placeholder="e.g., Savings" />
        </div>
      </div>

      <div class="actions">
        <button id="checkBtn">Check Balance</button>
        <button class="secondary" id="resetBtn">Reset</button>
      </div>
    </section>

    <section class="card">
      <h2>Result</h2>
      <div id="status" class="status"></div>
      <pre id="raw" class="raw"></pre>
      <div class="actions">
        <button class="secondary" id="copyCurlBtn">Copy cURL</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <small>Frontend for Mule API: <code>GET /api/checkBalance</code></small>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
